name: mcp-tools-cloudflare
runtime:
  name: python
  options:
    virtualenv: venv
# Pulumi Cloud copies this into a stack tag capped at 256 chars — keep it short.
description: >-
  Shared ingress identity for every deployment path: one Cloudflare Tunnel +
  one wildcard DNS record. Consumed by local deploys (credsJson) and the AWS
  stack (StackReference). Runbooks: docs/deploy/{local,aws}.md.
