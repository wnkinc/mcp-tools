name: mcp-tools-aws
runtime:
  name: python
  options:
    virtualenv: venv
# Pulumi Cloud copies this into a stack tag capped at 256 chars — keep it short.
description: >-
  One EC2 VM running the same docker-compose stack as a local deploy, behind
