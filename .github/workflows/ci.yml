name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Enforces exactly what the local git hook runs (ruff lint+format, gitleaks) --
  # .pre-commit-config.yaml is the single source of truth for both.
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      # Hook envs (incl. the gitleaks Go build) are a one-time cost with this cache.
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}
      - run: pip install pre-commit
      - run: pre-commit run --all-files --show-diff-on-failure

  pytest:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - tests: tools/data
            lock: tools/data/requirements.lock
          - tests: tools/xmcp
            lock: tools/xmcp/requirements.lock
          - tests: tools/lean
            lock: tools/lean/requirements.lock
            python: "3.11" # the engine image's interpreter, which this lock targets
          - tests: tools/telegram
            lock: tools/telegram/requirements.lock
          # security/ has no lock of its own; xmcp is the max-posture tool, so its
          # lock covers every shared layer (auth + approval + guardrail).
          - tests: security
            lock: tools/xmcp/requirements.lock
    name: pytest (${{ matrix.tests }})
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python || '3.12' }} # matches each tool container
          cache: pip
          cache-dependency-path: ${{ matrix.lock }}
      # Full lockfile, not a test subset: doubles as "the lock still installs cleanly".
      # The locks are hash-pinned, so pytest (dev-only, deliberately not in them)
      # must be a separate resolution or --require-hashes rejects it.
      - run: pip install -r ${{ matrix.lock }}
      # pynacl: the security tests exercise the approval sidecar's Discord Ed25519
      # verification; it lives in the sidecar's own lock, not xmcp's.
      - run: pip install pytest pynacl
      - run: pytest ${{ matrix.tests }} -q

  compose-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # The real .env files are gitignored secrets, but compose hard-fails on a
      # missing env_file -- empty stubs are enough for config validation.
      - run: for t in xmcp data lean telegram; do touch tools/$t/.env; done
      - name: validate local posture
        run: docker compose config -q
      # The tunnel overlay requires the deployment identity (root .env); validate
      # with the committed template's placeholder values.
      - name: validate public (tunnel) posture
        run: |
          cp env.example .env
          echo "TUNNEL_ID=00000000-0000-0000-0000-000000000000" >> .env
          docker compose -f docker-compose.yml -f docker-compose.tunnel.yml config -q
