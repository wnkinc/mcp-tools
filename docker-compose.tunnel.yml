# Public overlay: adds the Cloudflare tunnel ingress and flips each tool to its public
# posture. Deployment identity (your domain, tunnel id) comes from the root .env
# (`cp env.example .env` and fill it in). Layer it on top of the base compose:
#
#   docker compose -f docker-compose.yml -f docker-compose.tunnel.yml up -d
#
# Same images and .env files as the base -- the only difference is the posture env and
# the cloudflared sidecar.
services:
  cloudflared:
    image: cloudflare/cloudflared@sha256:188bb03589a32affed3cf4d0590565ffe67b78866e6b5582574afab2b705bafe  # cloudflare/cloudflared:2026.7.1, pin by digest
    command: tunnel --config /etc/cloudflared/config.yml run
    restart: unless-stopped
    # Run as the credentials file's owner so it can read the mounted secret (the image's
    # default user can't). Override if your staged credentials are owned by another uid.
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    configs:
      - source: cloudflared-config
        target: /etc/cloudflared/config.yml
    volumes:
      - ./security/ingress/secrets/creds.json:/etc/cloudflared/creds.json:ro
    networks:
      - internal   # forwards to the tools over the private network
      - edge       # dials out to the Cloudflare edge
    # No depends_on: which tools run is chosen per-deploy via COMPOSE_PROFILES, so the
    # ingress can't require any one of them. Routes 502 until their tool is healthy.

  # The approval sidecar's human-facing pages (approve page + Slack webhook) go public
  # here; APPROVAL_PUBLIC_URL is what the links in chat/Slack point at.
  approval:
    environment:
      APPROVAL_PUBLIC_URL: https://approval.${MCP_DOMAIN}

  # The tools' secrets are already loaded by the base; this overlay flips posture on and
  # stamps each tool's public URL from MCP_DOMAIN (environment beats env_file).
  # Approval defaults ON for the gated tools; a deploy that has no approval channel
  # configured opts out explicitly with MCP_REQUIRE_APPROVAL=0 in the root .env
  # (without a channel, gated calls just report the approval as undeliverable).
  xmcp:
    environment:
      MCP_AUTH_ENABLED: "1"
      MCP_REQUIRE_APPROVAL: ${MCP_REQUIRE_APPROVAL:-1}
      MCP_UNTRUSTED_OUTPUT: "1"
      MCP_PUBLIC_URL: https://xmcp.${MCP_DOMAIN}

  data:
    environment:
      MCP_AUTH_ENABLED: "1"
      MCP_REQUIRE_APPROVAL: ${MCP_REQUIRE_APPROVAL:-1}
      MCP_PUBLIC_URL: https://data.${MCP_DOMAIN}

  lean:
    environment:
      MCP_AUTH_ENABLED: "1"
      MCP_REQUIRE_APPROVAL: ${MCP_REQUIRE_APPROVAL:-1}
      MCP_PUBLIC_URL: https://lean.${MCP_DOMAIN}

  telegram:
    environment:
      MCP_AUTH_ENABLED: "1"
      MCP_REQUIRE_APPROVAL: ${MCP_REQUIRE_APPROVAL:-1}
      MCP_UNTRUSTED_OUTPUT: "1"
      MCP_PUBLIC_URL: https://telegram.${MCP_DOMAIN}

  # The gatekeeper flips other tools' approval requirement. set_gating is ALWAYS gated
  # (the in-chat widget is its own approval channel, so it needs no Slack/Discord/etc),
  # and it shows the card via APPROVAL_WIDGET -> APPROVAL_PUBLIC_URL.
  # Workspace acts as YOUR Google account and returns untrusted external content;
  # the engine's OAuth redirect must match the public URL exactly.
  workspace:
    environment:
      MCP_AUTH_ENABLED: "1"
      MCP_REQUIRE_APPROVAL: ${MCP_REQUIRE_APPROVAL:-1}
      MCP_UNTRUSTED_OUTPUT: "1"
      MCP_PUBLIC_URL: https://workspace.${MCP_DOMAIN}
      WORKSPACE_EXTERNAL_URL: https://workspace.${MCP_DOMAIN}
      GOOGLE_OAUTH_REDIRECT_URI: https://workspace.${MCP_DOMAIN}/oauth2callback

  gatekeeper:
    environment:
      MCP_AUTH_ENABLED: "1"
      MCP_REQUIRE_APPROVAL: "1"
      APPROVAL_WIDGET: "1"
      APPROVAL_PUBLIC_URL: https://approval.${MCP_DOMAIN}
      MCP_PUBLIC_URL: https://gatekeeper.${MCP_DOMAIN}

# INGRESS routing, committed here so nothing public runs that isn't in the repo. Compose
# interpolates ${MCP_DOMAIN}/${TUNNEL_ID} from the root .env and mounts the rendered
# file into the sidecar -- the committed routing stays generic. cloudflared dials OUT to
# Cloudflare's edge (no inbound ports) and forwards to each tool over the compose
# `internal` network by service name, so tools publish no host ports. The credentials
# JSON is the secret half, staged at security/ingress/secrets/creds.json (gitignored).
configs:
  cloudflared-config:
    content: |
      tunnel: ${TUNNEL_ID:?set TUNNEL_ID in the root .env (cp env.example .env)}
      credentials-file: /etc/cloudflared/creds.json

      # Each MCP server does its OWN Google OAuth (no Cloudflare Access policy here).
      # Routes for tools you haven't enabled in COMPOSE_PROFILES just answer 502 at the
      # edge (harmless); delete a route if you'd rather the hostname 404.
      ingress:
        - hostname: xmcp.${MCP_DOMAIN:?set MCP_DOMAIN in the root .env (cp env.example .env)}
          service: http://xmcp:8061
        - hostname: data.${MCP_DOMAIN}
          service: http://data:8062
        - hostname: lean.${MCP_DOMAIN}
          service: http://lean:8064
        - hostname: telegram.${MCP_DOMAIN}
          service: http://telegram:8063
        - hostname: gatekeeper.${MCP_DOMAIN}
          service: http://gatekeeper:8065
        - hostname: workspace.${MCP_DOMAIN}
          service: http://workspace:8066
        # The approval sidecar goes public ONLY on its human-facing paths: the
        # capability-token pages (approve, the manage widget's session -- tokens
        # are the credential) and the provider interactivity webhooks
        # (signature/secret-verified) -- point whichever provider you use at
        # https://approval.<MCP_DOMAIN>/<provider>/interact.
        # Everything else on the sidecar is internal-only and must stay that way:
        # /gate, /gating, /catalog, and the bare /manage token mint are unauthenticated
        # write surfaces for the tools on the compose network.
        - hostname: approval.${MCP_DOMAIN}
          path: ^/(approve|manage)/.+
          service: http://approval:8072
        - hostname: approval.${MCP_DOMAIN}
          path: ^/(slack|discord|telegram)/interact$
          service: http://approval:8072

        # Everything else is refused.
        - service: http_status:404
