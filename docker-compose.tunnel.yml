# PUBLIC overlay: adds the Cloudflare tunnel ingress and flips the tool to its public
# security posture. Layer it on top of the base (local-demo) compose:
#
#   docker compose -f docker-compose.yml -f docker-compose.tunnel.yml up -d
#
# The base file is the local deploy (auth off, no ingress). This overlay makes it the
# public deploy: OAuth + approval + guardrail all ON, ingress via the tunnel. Same images
# and .env files (loaded by the base) -- the whole difference is the posture env + the
# cloudflared sidecar.
services:
  cloudflared:
    image: cloudflare/cloudflared@sha256:6d91c121b803126f7a5344005d17a9324788fc09d305b6e2560ec6040a7ae283  # cloudflare/cloudflared:latest, pin by digest
    command: tunnel --config /etc/cloudflared/config.yml run
    restart: unless-stopped
    # Run as the creds file's owner so it can read the 0400 secret (the image default
    # user 65532 can't). Override if your staged creds.json is owned by another uid.
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    volumes:
      - ./security/ingress/cloudflared.config.yml:/etc/cloudflared/config.yml:ro
      - ./security/ingress/secrets/creds.json:/etc/cloudflared/creds.json:ro
    networks:
      - internal   # forwards to http://xmcp:8061 over the private network
      - edge       # dials out to the Cloudflare edge
    depends_on:
      xmcp:
        condition: service_healthy

  # The tools' .env files (Google OAuth client, allowed emails, bearer/provider keys) are
  # already loaded by the base; this overlay only flips the posture on.
  xmcp:
    environment:
      MCP_AUTH_ENABLED: "1"       # public: Google OAuth on (overrides base "0")
      MCP_REQUIRE_APPROVAL: "1"   # out-of-band human approval on
      MCP_UNTRUSTED_OUTPUT: "1"   # guardrail screening on

  # Trusted tools: public posture is just OAuth on (no approval/guardrail).
  quant:
    environment:
      MCP_AUTH_ENABLED: "1"

  data:
    environment:
      MCP_AUTH_ENABLED: "1"
