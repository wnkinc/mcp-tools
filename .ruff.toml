# Lint/format for all first-party Python. Tools run on py3.12 (amazonlinux) except
# lean, which is pinned to the engine image's py3.11 — so 3.11 is the floor.
target-version = "py311"
line-length = 100

# A tool dir is its own import root inside its container; list a tool here ONLY
# if its server.py imports siblings top-level (data: `lake`/`feeds`), so isort
# classifies those as first-party.
src = [".", "tools/data"]

extend-exclude = ["vendor"]

[lint]
select = [
    "E4", "E7", "E9", "F",  # pycodestyle/pyflakes defaults
    "I",                    # isort
    "UP",                   # pyupgrade
    "B",                    # bugbear
    "S",                    # flake8-bandit (SAST)
]

[lint.per-file-ignores]
# Tests are built from asserts, dummy credentials, and 0.0.0.0 fixtures.
"**/test_*.py" = ["S101", "S104", "S105", "S106", "S107"]
# The engine launch: fixed argv (no shell), dotnet PATH-resolved in the container.
"tools/lean/server.py" = ["S603", "S607"]
