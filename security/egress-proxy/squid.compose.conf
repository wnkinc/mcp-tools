# mcp-tools egress proxy — COMPOSE/container variant (THREAT-MODEL L2).
#
# Same policy as the host squid.conf (CONNECT-only, HTTPS-only, domain allowlist,
# DEFAULT-DENY / fail closed), but shaped for a container sidecar:
#   - one listener on :3128 (the compose stack is single-tool: x-mcp),
#   - allowlist mounted read-only from the repo (allowlist/x-mcp.txt),
#   - logs to stdout so `docker compose logs egress` is the egress audit trail.
#
# The wall is enforced by the compose network topology, not this file: the tool sits on
# an `internal` network with no gateway, so this proxy (its only peer with an `edge` leg)
# is the sole route off-box. A dep that ignores HTTPS_PROXY simply has nowhere to go.
#
# Multi-tool later: give each tool its own listener + `myportname` acl (as the host conf
# does), or run one egress sidecar per tool.

http_port 3128

# --- x-mcp allowlist (dstdomain file, mounted from the repo) ---
acl dom_x_mcp dstdomain "/etc/squid/allowlist/x-mcp.txt"

# --- method / port safety ---
acl CONNECT method CONNECT
acl SSL_ports port 443

# --- policy: only HTTPS CONNECT, only to x-mcp's allowlisted domains ---
http_access deny CONNECT !SSL_ports
http_access allow CONNECT dom_x_mcp
# Fail closed: anything not explicitly allowed above is denied (and logged).
http_access deny all

# --- no caching, minimal footprint, don't leak proxy details ---
cache deny all
httpd_suppress_version_string on
via off
forwarded_for delete
# coredump/swap dir the image ships proxy-writable (squid warns without it).
coredump_dir /var/spool/squid

# --- egress audit trail ---
# Log to the proxy-writable /var/log/squid (squid drops to the unprivileged 'proxy'
# user, which can't open the container's root-owned /dev/stdout). Inspect the wall's
# audit trail with:  docker compose exec egress cat /var/log/squid/access.log
access_log /var/log/squid/access.log squid
cache_log /var/log/squid/cache.log
shutdown_lifetime 5 seconds
