# mcp-tools egress proxy — COMPOSE/container variant (THREAT-MODEL L2).
#
# Same policy + per-tool scoping as the host squid.conf (CONNECT-only, HTTPS-only,
# DEFAULT-DENY / fail closed), shaped for a single sidecar serving all three tools:
#   - one listener per tool (name=...), mapped to that tool's allowlist via `myportname`,
#     so a compromised tool can only reach ITS domains, not another tool's;
#   - allowlists mounted read-only from the repo (allowlist/*.txt);
#   - logs to the proxy-writable /var/log/squid (the unprivileged 'proxy' user can't open
#     the container's root-owned /dev/stdout). Inspect the audit trail with:
#       docker compose exec egress cat /var/log/squid/access.log
#
# The wall is enforced by the compose network topology: each tool sits on an `internal`
# network with no gateway, so this proxy (its only peer with an `edge` leg) is the sole
# route off-box. Each tool sets HTTPS_PROXY -> http://egress:<its port>.

# --- per-tool listeners ---
http_port 3128 name=x-mcp
http_port 3129 name=data
http_port 3130 name=quant

# --- per-tool allowlists (dstdomain files, mounted from the repo) ---
acl port_x_mcp myportname x-mcp
acl dom_x_mcp  dstdomain "/etc/squid/allowlist/x-mcp.txt"
acl port_data  myportname data
acl dom_data   dstdomain "/etc/squid/allowlist/data.txt"
acl port_quant myportname quant
acl dom_quant  dstdomain "/etc/squid/allowlist/quant.txt"

# --- method / port safety ---
acl CONNECT method CONNECT
acl SSL_ports port 443

# --- policy: only HTTPS CONNECT, only to each tool's own allowlisted domains ---
http_access deny CONNECT !SSL_ports
http_access allow port_x_mcp CONNECT dom_x_mcp
http_access allow port_data  CONNECT dom_data
http_access allow port_quant CONNECT dom_quant
# Fail closed: anything not explicitly allowed above is denied (and logged).
http_access deny all

# --- no caching, minimal footprint, don't leak proxy details ---
cache deny all
httpd_suppress_version_string on
via off
forwarded_for delete
coredump_dir /var/spool/squid

# --- egress audit trail (-> proxy-writable file; the access log IS the audit trail) ---
access_log /var/log/squid/access.log squid
cache_log /var/log/squid/cache.log
shutdown_lifetime 5 seconds
