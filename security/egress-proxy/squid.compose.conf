# mcp-tools egress proxy — compose/container variant.
#
# Same policy + per-tool scoping as the host squid.conf (CONNECT-only, HTTPS-only,
# DEFAULT-DENY / fail closed), shaped for a single sidecar serving all the tools:
#   - one listener per tool (name=...), mapped to that tool's allowlist via `myportname`,
#     so a compromised tool can only reach ITS domains, not another tool's;
#   - allowlists mounted read-only from the repo (allowlist/*.txt);
#   - logs to the proxy-writable /var/log/squid (the unprivileged 'proxy' user can't open
#     the container's root-owned /dev/stdout). Inspect the audit trail with:
#       docker compose exec egress cat /var/log/squid/access.log
#
# The wall is enforced by the compose network topology: each tool sits on an `internal`
# network with no gateway, so this proxy (its only peer with an `edge` leg) is the sole
# route off-box. Each tool sets HTTPS_PROXY -> http://egress:<its port>.

# --- per-tool listeners ---
http_port 3128 name=x-mcp
http_port 3129 name=data
http_port 3130 name=lean
http_port 3131 name=telegram
http_port 3132 name=approval
http_port 3133 name=guardrail
http_port 3134 name=gatekeeper

# --- per-tool allowlists (dstdomain files, mounted from the repo) ---
acl port_x_mcp myportname x-mcp
acl dom_x_mcp  dstdomain "/etc/squid/allowlist/x-mcp.txt"
acl port_data  myportname data
acl dom_data   dstdomain "/etc/squid/allowlist/data.txt"
acl port_lean  myportname lean
acl dom_lean   dstdomain "/etc/squid/allowlist/lean.txt"
acl port_telegram myportname telegram
acl dom_telegram  dstdomain "/etc/squid/allowlist/telegram.txt"
acl port_approval myportname approval
acl dom_approval  dstdomain "/etc/squid/allowlist/approval.txt"
acl port_guardrail myportname guardrail
acl dom_guardrail  dstdomain "/etc/squid/allowlist/guardrail.txt"
acl port_gatekeeper myportname gatekeeper
acl dom_gatekeeper  dstdomain "/etc/squid/allowlist/gatekeeper.txt"
# Telegram is the one tool that also needs an IP allowlist: MTProto (Telethon)
# dials the datacenter IPs directly -- there are no hostnames to match. These are
# Telegram's published production DC ranges; a legit miss shows up as TCP_DENIED
# to a 149.154/91.108 address in the access log.
acl net_telegram dst 149.154.160.0/20
acl net_telegram dst 91.108.4.0/22 91.108.8.0/22 91.108.12.0/22
acl net_telegram dst 91.108.16.0/22 91.108.20.0/22 91.108.56.0/22

# --- method / port safety ---
acl CONNECT method CONNECT
acl SSL_ports port 443

# --- policy: only HTTPS CONNECT, only to each tool's own allowlisted domains ---
http_access deny CONNECT !SSL_ports
http_access allow port_x_mcp CONNECT dom_x_mcp
http_access allow port_data  CONNECT dom_data
http_access allow port_lean  CONNECT dom_lean
http_access allow port_telegram CONNECT dom_telegram
http_access allow port_telegram CONNECT net_telegram
http_access allow port_approval CONNECT dom_approval
http_access allow port_guardrail CONNECT dom_guardrail
http_access allow port_gatekeeper CONNECT dom_gatekeeper
# Instance-role credentials (cloud deploys): boto3 in the guardrail resolves its
# AWS credentials from the EC2 instance metadata service, and the sealed internal
# network has no route there -- so IMDS rides the wall too. Plain HTTP (the IMDSv2
# token dance is a PUT + GETs), pinned to the guardrail listener and the one
# link-local address. Local runs simply never dial it.
acl imds dst 169.254.169.254/32
acl imds_port port 80
http_access allow port_guardrail imds imds_port !CONNECT
# Fail closed: anything not explicitly allowed above is denied (and logged).
http_access deny all

# --- no caching, minimal footprint, don't leak proxy details ---
cache deny all
httpd_suppress_version_string on
via off
forwarded_for delete
coredump_dir /var/spool/squid

# --- egress audit trail (-> proxy-writable file; the access log IS the audit trail) ---
access_log /var/log/squid/access.log squid
cache_log /var/log/squid/cache.log
shutdown_lifetime 5 seconds
