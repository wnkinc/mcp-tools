<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  /* Everything sits on TRANSPARENT backgrounds so the widget adopts the chat surface.
     All grays are semi-transparent so they read correctly on any host background;
     only text colors switch with the theme.
     THEME SOURCE: the host's theme (hostContext.theme -> data-theme on <html>, set via
     ExtApps.applyDocumentTheme) beats the OS prefers-color-scheme fallback. That helper
     also sets an inline color-scheme matching the embedder -- REQUIRED for transparency:
     Chromium paints an opaque canvas behind any iframe whose color-scheme differs from
     the embedding page's, and claude.ai's theme toggle doesn't follow the OS. */
  :root {
    --ink:#1c1c1a; --ink-2:#5d5b55; --muted:#84827b;
    --border:rgba(0,0,0,0.13); --tint:rgba(0,0,0,0.045);
    --accent:#c96442; --accent-hover:#b5573a; --accent-ink:#fffdfa;
    --ok:#1a7f37; --no:#b3261e; --warn:#9a6700; color-scheme:light;
  }
  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) { --ink:#ededeb; --ink-2:#b8b7af; --muted:#8d8c85;
      --border:rgba(255,255,255,0.16); --tint:rgba(255,255,255,0.06);
      --accent:#c96442; --accent-hover:#d97757; --accent-ink:#fffdfa;
      --ok:#5bb96a; --no:#e5645c; --warn:#d4a72c; color-scheme:dark; }
  }
  :root[data-theme="dark"] { --ink:#ededeb; --ink-2:#b8b7af; --muted:#8d8c85;
    --border:rgba(255,255,255,0.16); --tint:rgba(255,255,255,0.06);
    --accent:#c96442; --accent-hover:#d97757; --accent-ink:#fffdfa;
    --ok:#5bb96a; --no:#e5645c; --warn:#d4a72c; color-scheme:dark; }
  html,body{margin:0;background:transparent}
  /* Start with NO padding and the card hidden: a gated tool is tagged as a widget tool,
     so the host draws this iframe on EVERY call to it (incl. the approved re-run). We
     reveal only for an actual pending approval -> the success re-run never flashes. */
  body{font:13.5px/1.5 system-ui,-apple-system,"Segoe UI",sans-serif;color:var(--ink);padding:0}
  .card{border:1px solid var(--border);border-radius:12px;overflow:hidden}
  .body{padding:14px 16px}
  .head{font-weight:400;font-size:14px;margin-bottom:10px}
  .action{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12.5px;color:var(--ink-2);
    background:var(--tint);border-radius:8px;padding:9px 11px;word-break:break-word}
  .btns{display:flex;gap:8px;margin-top:12px}
  button{flex:1;font:inherit;font-weight:400;padding:8px 12px;border-radius:8px;border:0;
    cursor:pointer;transition:background .1s}
  button:disabled{opacity:.45;cursor:default}
  button:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
  /* both actions transparent: hairline outline, matched ink, no visual rank */
  .approve,.deny{background:transparent;border:1px solid var(--border);color:var(--ink)}
  .approve:hover:enabled,.deny:hover:enabled{background:var(--tint)}
  button:active:enabled{opacity:.8}
  .inline-err{margin-top:10px;font-size:12px;color:var(--no)}
  /* decided panel */
  .result{padding:14px 16px;border-top:1px solid var(--border)}
  /* only the glyph carries color; the word matches the title ink */
  .result .status{font-weight:400;font-size:14px;color:var(--ink)}
  .result.ok .glyph{color:var(--ok)} .result.no .glyph{color:var(--no)} .result.warn .glyph{color:var(--warn)}
  .result .instruct{margin-top:8px;color:var(--ink-2);font-size:12.5px}
  .result .instruct b{color:var(--ink)}
  /* click-to-copy reply chip (overrides the shared button rule) */
  .reply{display:inline-block;flex:none;margin:0 2px;font-family:ui-monospace,monospace;font-size:12.5px;
    font-weight:400;color:var(--ink);background:var(--tint);border:1px solid var(--border);border-radius:6px;
    padding:3px 9px;cursor:pointer}
  .reply:hover{background:var(--border)}
  .reply.copied{color:var(--muted)}
  details{border-top:1px solid var(--border)}
  summary{cursor:pointer;color:var(--muted);font-size:11px;padding:8px 16px;list-style:none}
  summary::-webkit-details-marker{display:none}
  #diag{font-family:ui-monospace,monospace;font-size:11px;white-space:pre-wrap;color:var(--muted);
    padding:0 16px 10px;max-height:180px;overflow-y:auto}
  [hidden]{display:none!important}
</style>
</head>
<body>
<script>
  window.diag = (m) => { const d=document.getElementById("diag"); if(d) d.textContent += m+"\n"; };
  ["error","unhandledrejection"].forEach((k)=>addEventListener(k,(e)=>diag("PAGE ERROR: "+(e.reason?.message??e.reason??e.message??k))));
</script>
<div class="card" id="card" hidden>
  <div class="body" id="pending">
    <div class="head">Approval requested</div>
    <div class="action" id="action">…</div>
    <div class="btns">
      <button class="deny" id="deny" type="button">Deny</button>
      <button class="approve" id="approve" type="button">Approve</button>
    </div>
    <div class="inline-err" id="inlineErr" hidden></div>
  </div>
  <div class="result" id="result" hidden>
    <div class="status" id="rstatus"></div>
    <div class="instruct" id="rinstruct"></div>
  </div>
  <details>
    <summary>diagnostics</summary>
    <div id="diag"></div>
  </details>
</div>
<script type="module">
/*__EXT_APPS_BUNDLE__*/
</script>
<script type="module">
const { App, applyDocumentTheme } = globalThis.ExtApps;
const $ = (id) => document.getElementById(id);

// Follow the HOST's theme, not the OS: sets data-theme + an inline color-scheme that
// matches the embedder, which is what keeps the iframe backdrop transparent (see CSS).
// Idempotent: the host reports the theme twice at startup (our getHostContext() read
// plus its initial host-context-changed notification) -- only act on a change.
let curTheme = null;
const applyTheme = (t) => {
  if ((t === "dark" || t === "light") && t !== curTheme) {
    curTheme = t;
    applyDocumentTheme(t);
    diag("theme: " + t);
  }
};
const PUBLIC_BASE = "__APPROVAL_PUBLIC_BASE__";  // baked in by the resource handler
let ctx = null;

function parsePayload(text) {
  // The pending result is prose for the model + an HTML-comment marker for us.
  const m = text && text.match(/<!--APPROVAL\s+(\{[\s\S]*?\})\s*-->/);
  if (m) { try { return JSON.parse(m[1]); } catch {} }
  return null;  // no marker -> not a pending request (e.g. the approved re-run's result)
}

function showResult(kind, glyph, label, replyWord, tail) {
  $("pending").hidden = true;
  const r = $("result");
  r.hidden = false;
  r.className = "result " + kind;
  const st = $("rstatus");
  st.replaceChildren();
  const g = document.createElement("span");
  g.className = "glyph";
  g.textContent = glyph;
  st.append(g, "  " + label);
  // No reply word (deny) -> just the status line, no instruction.
  const inst = $("rinstruct");
  inst.hidden = !replyWord;
  if (!replyWord) return;
  // "Reply [chip] to continue." — the chip copies the reply word on click.
  inst.replaceChildren("Reply ");
  const chip = document.createElement("button");
  chip.type = "button";
  chip.className = "reply";
  chip.textContent = replyWord;
  chip.title = "Copy";
  chip.addEventListener("click", async () => {
    try { await navigator.clipboard.writeText(replyWord); }
    catch {  // clipboard API can be blocked in sandboxed iframes
      const t = document.createElement("textarea");
      t.value = replyWord; document.body.append(t); t.select();
      document.execCommand("copy"); t.remove();
    }
    chip.classList.add("copied");
    chip.textContent = "Copied";
    setTimeout(() => { chip.textContent = replyWord; chip.classList.remove("copied"); }, 1200);
  });
  inst.append(chip, " " + tail);
}

async function decide(decision) {
  $("approve").disabled = true;
  $("deny").disabled = true;
  $("inlineErr").hidden = true;
  if (!ctx?.token) { showInlineErr("No approval token — reload and try again."); return; }
  diag(`decision=${decision}; token=${ctx.token.slice(0,6)}…`);
  let flipped = false;

  // Direct POST to the sidecar — session-independent (csp.connectDomains, honored on
  // web+desktop). no-cors: the request lands even though the opaque response can't be
  // read; a thrown "Failed to fetch" means CSP blocked it.
  try {
    await fetch(`${PUBLIC_BASE}/approve/${ctx.token}`, {
      method: "POST", mode: "no-cors",
      headers: { "content-type": "application/x-www-form-urlencoded" },
      body: "decision=" + decision,
    });
    flipped = true;
    diag("direct-fetch: SENT");
  } catch (e) { diag("direct-fetch: BLOCKED — " + (e?.message ?? e)); }

  if (!flipped) { showInlineErr("Couldn't reach the approval service. Try again."); return; }

  // No composer text is ever injected (it trips claude.ai's prompt-injection warning),
  // so the widget tells the USER to nudge the assistant onward.
  if (decision === "approve") {
    showResult("ok", "✓", "Approved", "Approved", "to continue.");
  } else {
    showResult("no", "✕", "Denied");
  }
}

function showInlineErr(msg) {
  $("approve").disabled = false;
  $("deny").disabled = false;
  const e = $("inlineErr");
  e.hidden = false;
  e.textContent = msg;
}

const app = new App({ name: "approval-widget", version: "0.2.0" }, {}, { autoResize: true });
app.ontoolresult = (result) => {
  const text = result?.content?.[0]?.text ?? "";
  diag("toolresult: " + text.slice(0, 100));
  const p = parsePayload(text);
  if (p?.token) {
    // A gated call is waiting for approval → REVEAL the card (it starts hidden).
    ctx = p;
    $("action").textContent = p.action ?? "(no action)";
    document.body.style.padding = "12px";
    $("card").hidden = false;
    diag("pending ✓; base=" + PUBLIC_BASE);
  }
  // else: not a pending request (the approved re-run's real result) → stay hidden.
  // Nothing to do; the card was never shown, so there's no flash to collapse.
};
$("approve").addEventListener("click", () => decide("approve"));
$("deny").addEventListener("click", () => decide("deny"));
app.onhostcontextchanged = (c) => applyTheme(c?.theme);
await app.connect();
applyTheme(app.getHostContext()?.theme);
diag("connected");
</script>
</body>
</html>
