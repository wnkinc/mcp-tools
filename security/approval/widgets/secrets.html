<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  /* Same transparent, host-theme-following conventions as manage.html. A small
     form card: one row per secret from the tool's deploy manifest. Values POST
     directly to the sidecar (capability token) -- never through the chat. */
  :root {
    --ink:#1c1c1a; --ink-2:#6e6c64; --muted:#9c9a92;
    --border:rgba(0,0,0,0.09); --tint:rgba(0,0,0,0.035);
    --field:#ffffff; --field-border:rgba(0,0,0,0.14);
    --accent:#c96442; --accent-hover:#b5573a; --accent-ink:#fffdfa;
    --ok:#1a7f37; --no:#b3261e; color-scheme:light;
  }
  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) { --ink:#ededeb; --ink-2:#a8a79f; --muted:#807f78;
      --border:rgba(255,255,255,0.11); --tint:rgba(255,255,255,0.05);
      --field:rgba(255,255,255,0.07); --field-border:rgba(255,255,255,0.18);
      --accent:#c96442; --accent-hover:#d97757; --accent-ink:#fffdfa;
      --ok:#5bb96a; --no:#e5645c; color-scheme:dark; }
  }
  :root[data-theme="dark"] { --ink:#ededeb; --ink-2:#a8a79f; --muted:#807f78;
    --border:rgba(255,255,255,0.11); --tint:rgba(255,255,255,0.05);
    --field:rgba(255,255,255,0.07); --field-border:rgba(255,255,255,0.18);
    --accent:#c96442; --accent-hover:#d97757; --accent-ink:#fffdfa;
    --ok:#5bb96a; --no:#e5645c; color-scheme:dark; }
  html,body{margin:0;background:transparent}
  body{font:13.5px/1.5 system-ui,-apple-system,"Segoe UI",sans-serif;color:var(--ink);padding:0}
  .card{border:1px solid var(--border);border-radius:12px;overflow:hidden;display:flex;flex-direction:column}
  .lead{padding:14px 16px 6px}
  .title{font-weight:600;font-size:14px}
  .sub{color:var(--muted);font-size:12.5px;margin-top:2px}
  .rows{padding:4px 16px}
  .frow{padding:10px 0;border-bottom:1px solid var(--border)}
  .frow:last-child{border-bottom:0}
  .flabel{display:flex;align-items:center;gap:8px;font-weight:500;font-size:13px}
  .staged{font-size:11px;color:var(--ok)}
  .fhint{color:var(--muted);font-size:11.5px;margin:2px 0 6px}
  .frow input{width:100%;box-sizing:border-box;font:inherit;font-size:13px;color:var(--ink);
    background:var(--field);border:1px solid var(--field-border);border-radius:8px;
    padding:7px 10px}
  .frow input:focus-visible{outline:2px solid var(--accent);outline-offset:1px}
  .frow input:disabled{opacity:.5}
  .savebar{display:flex;align-items:center;gap:10px;padding:10px 16px;border-top:1px solid var(--border)}
  .note{flex:1;font-size:12px;color:var(--ink-2)}
  .note.err{color:var(--no)}
  .note .nglyph{color:var(--ok)}
  /* same convention as the approval card's buttons: transparent, hairline outline,
     matched ink -- no accent fill, no visual rank */
  .save{font:inherit;font-weight:400;padding:7px 16px;border-radius:8px;cursor:pointer;
    background:transparent;border:1px solid var(--border);color:var(--ink);transition:background .1s}
  .save:hover:enabled{background:var(--tint)}
  .save:active:enabled{opacity:.8}
  .save:disabled{opacity:.45;cursor:default}
  .fullnote{padding:14px 16px;font-size:12.5px;color:var(--ink-2)}
  details{border-top:1px solid var(--border)}
  summary{cursor:pointer;color:var(--muted);font-size:11px;padding:8px 16px;list-style:none}
  summary::-webkit-details-marker{display:none}
  #diag{font-family:ui-monospace,monospace;font-size:11px;white-space:pre-wrap;color:var(--muted);
    padding:0 16px 10px;max-height:160px;overflow-y:auto}
  [hidden]{display:none!important}
</style>
</head>
<body>
<script>
  window.diag = (m) => { const d=document.getElementById("diag"); if(d) d.textContent += m+"\n"; };
  ["error","unhandledrejection"].forEach((k)=>addEventListener(k,(e)=>diag("PAGE ERROR: "+(e.reason?.message??e.reason??e.message??k))));
</script>
<div class="card" id="card" hidden>
  <div class="lead">
    <div class="title" id="title">Stage secrets</div>
    <div class="sub">Values go directly to your server — never through this chat.</div>
  </div>
  <div class="fullnote" id="fullnote" hidden></div>
  <div class="rows" id="rows"></div>
  <div class="savebar" id="savebar" hidden>
    <div class="note" id="note"></div>
    <button class="save" id="save" type="button" disabled>Save</button>
  </div>
  <details>
    <summary>diagnostics</summary>
    <div id="diag"></div>
  </details>
</div>
<script type="module">
/*__EXT_APPS_BUNDLE__*/
</script>
<script type="module">
const { App, applyDocumentTheme } = globalThis.ExtApps;
const $ = (id) => document.getElementById(id);
const PUBLIC_BASE = "__APPROVAL_PUBLIC_BASE__";  // baked in by the resource handler

let curTheme = null;
const applyTheme = (t) => {
  if ((t === "dark" || t === "light") && t !== curTheme) { curTheme = t; applyDocumentTheme(t); }
};

let ctx = null;      // {token, tool}
let done = false;    // one-shot: a save consumes the session and locks the form
let inputs = {};     // key -> input element

function parsePayload(text) {
  const m = text && text.match(/<!--SECRETS\s+(\{[\s\S]*?\})\s*-->/);
  if (m) { try { return JSON.parse(m[1]); } catch {} }
  return null;
}

function setNote(msg, kind) {
  const n = $("note");
  n.className = "note" + (kind ? " " + kind : "");
  n.replaceChildren();
  if (kind === "ok") {
    const g = document.createElement("span");
    g.className = "nglyph";
    g.textContent = "✓ ";
    n.append(g);
  }
  n.append(msg || "");
}

function refresh() {
  const filled = Object.values(inputs).some((i) => i.value.trim());
  $("save").disabled = done || !filled;
  $("save").textContent = done ? "Saved" : "Save";
}

function render(data) {
  $("title").textContent = `Stage secrets — ${data.tool}`;
  const rows = $("rows");
  rows.replaceChildren();
  inputs = {};
  for (const f of data.fields) {
    const row = document.createElement("div");
    row.className = "frow";
    const label = document.createElement("div");
    label.className = "flabel";
    label.textContent = f.label;
    if (f.staged) {
      const st = document.createElement("span");
      st.className = "staged";
      st.textContent = "✓ staged";
      label.append(st);
    }
    const hint = document.createElement("div");
    hint.className = "fhint";
    hint.textContent = f.hint + (f.staged ? " — leave blank to keep the current value." : "");
    const input = document.createElement("input");
    // Password field: values are secrets. No autofill, no autocomplete, not stored.
    input.type = "password";
    input.autocomplete = "off";
    input.spellcheck = false;
    input.placeholder = f.staged ? "(unchanged)" : f.key;
    input.setAttribute("aria-label", f.label);
    input.addEventListener("input", refresh);
    inputs[f.key] = input;
    row.append(label, hint, input);
    rows.append(row);
  }
  $("savebar").hidden = false;
  refresh();
}

async function save() {
  const values = {};
  for (const [key, input] of Object.entries(inputs)) {
    if (input.value.trim()) values[key] = input.value.trim();
  }
  if (done || !Object.keys(values).length) return;
  $("save").disabled = true;
  setNote("Saving…");
  try {
    const resp = await fetch(`${PUBLIC_BASE}/secrets/${ctx.token}`, {
      method: "POST",
      headers: { "content-type": "application/json" },
      body: JSON.stringify({ values }),
    });
    if (resp.status === 404) { setNote("Session expired — ask for the form again.", "err"); return; }
    const data = await resp.json();
    if (!data.ok) { setNote(data.error || "Save failed.", "err"); refresh(); return; }
    // One-shot: the server consumed the session. Lock and clear the fields --
    // values now live only on the server, not in this page.
    done = true;
    for (const input of Object.values(inputs)) { input.value = ""; input.disabled = true; }
    setNote(
      `Saved ${data.staged.length} value(s) directly to the server. The reconciler ` +
      "applies them within ~15s — check deploy_status, then deploy when ready.",
      "ok",
    );
    refresh();
  } catch (e) {
    diag("save failed: " + (e?.message ?? e));
    setNote("Couldn't reach the approval service. Try again.", "err");
    refresh();
  }
}

async function load() {
  try {
    const resp = await fetch(`${PUBLIC_BASE}/secrets/${ctx.token}`);
    if (resp.status === 404) {
      $("fullnote").hidden = false;
      $("fullnote").textContent = "This staging session expired — ask for the form again.";
      return;
    }
    render(await resp.json());
    diag(`loaded ${Object.keys(inputs).length} fields; base=${PUBLIC_BASE}`);
  } catch (e) {
    diag("load failed: " + (e?.message ?? e));
    $("fullnote").hidden = false;
    $("fullnote").textContent = "Couldn't reach the approval service to load the form.";
  }
}

const app = new App({ name: "secrets-widget", version: "0.1.0" }, {}, { autoResize: true });
app.ontoolresult = (result) => {
  const text = result?.content?.[0]?.text ?? "";
  const p = parsePayload(text);
  if (p?.token) {
    ctx = p;
    document.body.style.padding = "12px";
    $("card").hidden = false;
    load();
  }
};
$("save").addEventListener("click", save);
app.onhostcontextchanged = (c) => applyTheme(c?.theme);
await app.connect();
applyTheme(app.getHostContext()?.theme);
diag("connected");
</script>
</body>
</html>
