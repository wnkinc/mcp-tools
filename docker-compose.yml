# =================================================================================
# The "two substrates" picture (docs/SUBSTRATE.md): the x-mcp TOOL as a slim,
# ML-free container + the GUARDRAIL as its own sidecar carrying the heavy screener.
# The tool reaches the sidecar over the private compose network at http://guardrail:8071;
# neither bakes secrets -- env is injected here, the same image runs unchanged in cloud.
#
#   X_BEARER_TOKEN=... docker compose up --build
#
# Security POSTURE is chosen here by env, not in code (serve() reads it at startup):
# this local compose runs auth OFF (no tunnel/OAuth) but guardrail ON, to exercise the
# tool->sidecar screening path. A public deploy would flip MCP_AUTH_ENABLED on.
# =================================================================================
services:
  # --- EGRESS wall (THREAT-MODEL L2): the container idiom for the systemd
  # IPAddressDeny=any + HTTPS_PROXY combo. The tool sits on the `internal` network
  # (no gateway to the internet); this squid sidecar is its only peer with an `edge`
  # leg, so it is the sole route off-box, enforcing a CONNECT-only domain allowlist.
  egress:
    image: ubuntu/squid@sha256:6a097f68bae708cedbabd6188d68c7e2e7a38cedd05a176e1cc0ba29e3bbe029  # ubuntu/squid:latest, pin by digest (dependabot bumps)
    restart: unless-stopped
    volumes:
      - ./security/egress-proxy/squid.compose.conf:/etc/squid/squid.conf:ro
      - ./security/egress-proxy/allowlist:/etc/squid/allowlist:ro
    networks:
      - internal   # reachable by the tool as http://egress:3128
      - edge       # the only leg with internet -> performs the allowlisted CONNECTs

  guardrail:
    build: ./security/guardrail/service
    image: mcp-guardrail
    restart: unless-stopped
    # No published port: internal to the compose network only -- a true sidecar. Reached
    # by the tool as http://guardrail:8071. Uncomment to inspect /healthz from the host.
    # ports: ["8071:8071"]
    environment:
      GUARDRAIL_HOST: 0.0.0.0
      GUARDRAIL_PORT: 8071
      # Supply an HF token + mount the cache below to load the gated PromptGuard model;
      # otherwise the service comes up DEGRADED (HiddenASCII-only) and says so on /healthz.
      HF_TOKEN: ${HF_TOKEN:-}
    volumes:
      # Persist / supply the PromptGuard model cache across runs (optional).
      - guardrail-hf-cache:/app/.cache/huggingface
    networks:
      - internal   # internal-only: no external egress (degraded HiddenASCII w/o a model)
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request;urllib.request.urlopen('http://127.0.0.1:8071/healthz',timeout=3)"]
      interval: 30s
      timeout: 5s
      start_period: 90s
      retries: 3

  xmcp:
    build:
      # Context = repo root so the tool can COPY the shared ./security package.
      context: .
      dockerfile: tools/xmcp/Dockerfile
    image: mcp-xmcp
    restart: unless-stopped
    # No published host port ON PURPOSE: xmcp is on the `internal` network (the egress
    # wall), and Docker cannot publish a host port from an internal-only container. Ingress
    # is a substrate's job -- the cloudflared sidecar in docker-compose.tunnel.yml reaches
    # it at http://xmcp:8061 over the internal network. To poke it locally without the
    # tunnel: `docker compose exec xmcp ...` or a throwaway container on mcp-tools_internal.
    environment:
      MCP_HOST: 0.0.0.0
      MCP_PORT: 8061
      MCP_TRANSPORT: http
      # --- security posture for THIS substrate (see the table in docs/SUBSTRATE.md) ---
      MCP_AUTH_ENABLED: "0"          # local compose: no Cloudflare tunnel / OAuth in front
      MCP_REQUIRE_APPROVAL: "0"      # out-of-band human approval is a tunnel/Claude concern
      MCP_UNTRUSTED_OUTPUT: "1"      # screen X content -> promise honored by the sidecar below
      GUARDRAIL_URL: http://guardrail:8071
      GUARDRAIL_ENABLED: "1"
      # EGRESS: all outbound HTTPS is forced through the squid sidecar (the tool has no
      # internet of its own on the `internal` network). NO_PROXY keeps sideways/loopback
      # traffic direct: the guardrail sidecar, localhost, and the Docker embedded DNS.
      HTTPS_PROXY: http://egress:3128
      HTTP_PROXY: http://egress:3128
      NO_PROXY: guardrail,localhost,127.0.0.1
      # x-mcp needs its read-only app bearer to fetch X's OpenAPI spec + data.
      X_BEARER_TOKEN: ${X_BEARER_TOKEN:?set X_BEARER_TOKEN in your shell or a .env file}
    volumes:
      # Writable state (FASTMCP_HOME): OAuth client registrations + tokens when auth is on.
      - xmcp-state:/app/state
    networks:
      - internal   # internal-only: no direct internet; egress via the squid sidecar
    depends_on:
      guardrail:
        condition: service_healthy   # tool waits until the screener is actually ready
      egress:
        condition: service_started   # ...and until the egress proxy is up

  # --- TRUSTED tools: same image shape as xmcp, but no guardrail leg (they don't return
  # untrusted external content). Each points HTTPS_PROXY at its OWN egress listener, so it
  # can only reach its own allowlist. Auth is off for the local demo; the tunnel overlay
  # flips it on. They boot without secrets (no startup network fetch). ---
  quant:
    build:
      context: .
      dockerfile: tools/quant/Dockerfile
    image: mcp-quant
    restart: unless-stopped
    environment:
      MCP_HOST: 0.0.0.0
      MCP_TRANSPORT: http
      MCP_AUTH_ENABLED: "0"
      HTTPS_PROXY: http://egress:3130
      HTTP_PROXY: http://egress:3130
      NO_PROXY: localhost,127.0.0.1
    volumes:
      - quant-state:/app/state
    networks:
      - internal
    depends_on:
      egress:
        condition: service_started

  data:
    build:
      context: .
      dockerfile: tools/data/Dockerfile
    image: mcp-data
    restart: unless-stopped
    environment:
      MCP_HOST: 0.0.0.0
      MCP_TRANSPORT: http
      MCP_AUTH_ENABLED: "0"
      HTTPS_PROXY: http://egress:3129
      HTTP_PROXY: http://egress:3129
      NO_PROXY: localhost,127.0.0.1
    volumes:
      - data-state:/app/state
    networks:
      - internal
    depends_on:
      egress:
        condition: service_started

networks:
  # No gateway to the host/internet: containers here can only reach each other + any
  # peer that also has an `edge` leg (the egress proxy). This is the wall.
  internal:
    internal: true
  edge: {}

volumes:
  guardrail-hf-cache:
  xmcp-state:
  quant-state:
  data-state:
