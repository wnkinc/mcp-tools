# =================================================================================
# The local stack: each tool as a slim container behind an egress wall, plus the
# guardrail as its own sidecar. Secrets come from each tool's .env; the same images
# run unchanged in the cloud.
#
#   docker compose up --build
#
# Security posture is chosen by env, not code (serve() reads it at startup): this base
# file runs auth off (local dev) but the guardrail on. The docker-compose.tunnel.yml
# overlay is the public deploy (auth on + the Cloudflare ingress).
# =================================================================================
services:
  # Egress wall: each tool sits on the `internal` network (no gateway to the internet);
  # this proxy is the only peer with an `edge` leg, so it is the sole route off-box,
  # enforcing a per-tool CONNECT-only domain allowlist. A dep that ignores the proxy env
  # has nowhere to dial.
  egress:
    build: ./security/egress-proxy   # pinned ubuntu/squid + Ubuntu security updates
    image: mcp-egress
    restart: unless-stopped
    volumes:
      - ./security/egress-proxy/squid.compose.conf:/etc/squid/squid.conf:ro
      - ./security/egress-proxy/allowlist:/etc/squid/allowlist:ro
    networks:
      - internal   # reachable by tools as http://egress:<port>
      - edge       # the only leg with internet -> performs the allowlisted CONNECTs

  guardrail:
    build: ./security/guardrail/service
    image: mcp-guardrail
    restart: unless-stopped
    # No published port -- a true sidecar, reached over the network as http://guardrail:8071.
    environment:
      GUARDRAIL_HOST: 0.0.0.0
      GUARDRAIL_PORT: 8071
      # Supply a token + mount the cache below to load the gated model; otherwise the
      # service comes up degraded and says so on /healthz.
      HF_TOKEN: ${HF_TOKEN:-}
    volumes:
      - guardrail-hf-cache:/app/.cache/huggingface   # persist / supply the model cache (optional)
    networks:
      - internal   # internal-only: no external egress (degraded without a model)
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request;urllib.request.urlopen('http://127.0.0.1:8071/healthz',timeout=3)"]
      interval: 30s
      timeout: 5s
      start_period: 90s
      retries: 3

  # This tool screens its output through the guardrail (untrusted external content).
  xmcp:
    build:
      context: .   # repo root, so the image can COPY the shared ./security package
      dockerfile: tools/xmcp/Dockerfile
    image: mcp-xmcp
    restart: unless-stopped
    env_file:
      - tools/xmcp/.env       # the tool's secrets
    # No published host port: the tool is on the internal network (the egress wall), which
    # can't publish one. Ingress is the tunnel's job; to reach it locally use
    # `docker compose exec` or a container on mcp-tools_internal.
    environment:
      MCP_HOST: 0.0.0.0
      MCP_PORT: 8061
      MCP_TRANSPORT: http
      # Security posture for local dev (the tunnel overlay flips these on). These override
      # the .env's production values (env beats env_file).
      MCP_AUTH_ENABLED: "0"
      MCP_REQUIRE_APPROVAL: "0"
      MCP_UNTRUSTED_OUTPUT: "1"
      GUARDRAIL_URL: http://guardrail:8071
      GUARDRAIL_ENABLED: "1"
      # All outbound HTTPS is forced through the egress proxy; NO_PROXY keeps sideways +
      # loopback traffic direct (the guardrail, localhost, the Docker resolver).
      HTTPS_PROXY: http://egress:3128
      HTTP_PROXY: http://egress:3128
      NO_PROXY: guardrail,localhost,127.0.0.1
    volumes:
      - xmcp-state:/app/state   # writable state (OAuth registrations + tokens when auth is on)
    networks:
      - internal
    depends_on:
      guardrail:
        condition: service_healthy   # wait for the screener before starting
      egress:
        condition: service_started

  # Trusted tools: same shape, no guardrail leg. Each points at its OWN egress listener,
  # so it can only reach its own allowlist. Posture is local dev here; the overlay flips it.
  data:
    build:
      context: .
      dockerfile: tools/data/Dockerfile
    image: mcp-data
    restart: unless-stopped
    env_file:
      - tools/data/.env
    environment:
      MCP_HOST: 0.0.0.0
      MCP_TRANSPORT: http
      MCP_AUTH_ENABLED: "0"
      HTTPS_PROXY: http://egress:3129
      HTTP_PROXY: http://egress:3129
      NO_PROXY: localhost,127.0.0.1
      # Where lean-export writes Lean-format files (the volume shared with lean).
      LEAN_DATA_ROOT: /lean-data
    volumes:
      - data-state:/app/state
      - lean-data:/lean-data
    networks:
      - internal
    depends_on:
      egress:
        condition: service_started

  lean:
    build:
      context: .
      dockerfile: tools/lean/Dockerfile
    image: mcp-lean
    restart: unless-stopped
    env_file:
      - tools/lean/.env
    environment:
      MCP_HOST: 0.0.0.0
      MCP_TRANSPORT: http
      MCP_AUTH_ENABLED: "0"
      HTTPS_PROXY: http://egress:3130
      HTTP_PROXY: http://egress:3130
      NO_PROXY: localhost,127.0.0.1
      # The engine backtests ONLY pipeline data (the volume the data tool exports
      # into) -- never the image's bundled samples. server.py seeds the two engine
      # metadata files (market hours, symbol properties) there at startup.
      LEAN_DATA_FOLDER: /lean-data
    volumes:
      - lean-state:/app/state
      - lean-data:/lean-data
    networks:
      - internal
    depends_on:
      egress:
        condition: service_started

networks:
  # No gateway to the host/internet: containers here reach only each other + any peer
  # that also has an `edge` leg (the egress proxy). This is the wall.
  internal:
    internal: true
  edge: {}

volumes:
  lean-state:
  guardrail-hf-cache:
  xmcp-state:
  data-state:
  # Artifact plane between data (writer: lean-export) and lean (reader: the engine).
  # Cross-image access works via the shared 'leandata' group (gid 1500) both
  # Dockerfiles create -- the two images' 'app' users have different uids.
  lean-data:
