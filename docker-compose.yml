# =================================================================================
# The local stack: each tool as a slim container behind an egress wall, plus the
# guardrail as its own sidecar. Secrets come from each tool's .env; the same images
# run unchanged in the cloud.
#
#   cp env.example .env       # pick your tools: COMPOSE_PROFILES=xmcp,data,...
#   docker compose up --build
#
# Every tool carries a compose profile named after itself; only the tools listed in
# COMPOSE_PROFILES (root .env, or --profile flags) are built and started, so nobody
# pulls a tool's image — lean's is 13GB — without opting in. The egress wall and
# guardrail carry no profile: they are the shared substrate and always run.
#
# Security posture is chosen by env, not code (serve() reads it at startup): this base
# file runs auth off (local dev) but the guardrail on. The docker-compose.tunnel.yml
# overlay is the public deploy (auth on + the Cloudflare ingress).
# =================================================================================
services:
  # Egress wall: each tool sits on the `internal` network (no gateway to the internet);
  # this proxy is the only peer with an `edge` leg, so it is the sole route off-box,
  # enforcing a per-tool CONNECT-only domain allowlist. A dep that ignores the proxy env
  # has nowhere to dial.
  egress:
    build: ./security/egress-proxy   # pinned ubuntu/squid + Ubuntu security updates
    image: mcp-egress
    restart: unless-stopped
    volumes:
      - ./security/egress-proxy/squid.compose.conf:/etc/squid/squid.conf:ro
      - ./security/egress-proxy/allowlist:/etc/squid/allowlist:ro
    networks:
      - internal   # reachable by tools as http://egress:<port>
      - edge       # the only leg with internet -> performs the allowlisted CONNECTs

  guardrail:
    build: ./security/guardrail/service
    image: mcp-guardrail
    restart: unless-stopped
    # No published port -- a true sidecar, reached over the network as http://guardrail:8071.
    environment:
      GUARDRAIL_HOST: 0.0.0.0
      GUARDRAIL_PORT: 8071
      # Supply a token + mount the cache below to load the gated model; otherwise the
      # service comes up degraded and says so on /healthz.
      HF_TOKEN: ${HF_TOKEN:-}
    volumes:
      - guardrail-hf-cache:/app/.cache/huggingface   # persist / supply the model cache (optional)
    networks:
      - internal   # internal-only: no external egress (degraded without a model)
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request;urllib.request.urlopen('http://127.0.0.1:8071/healthz',timeout=3)"]
      interval: 30s
      timeout: 5s
      start_period: 90s
      retries: 3

  # Approval sidecar: single owner of pending approvals + the Slack secrets for the
  # whole stack (Slack delivers all button clicks to ONE app-level URL, so approvals
  # need one owner or only one tool's buttons work). Tools create/check approvals at
  # http://approval:8072; the tunnel overlay exposes its human-facing pages publicly.
  approval:
    build: ./security/approval/service
    image: mcp-approval
    restart: unless-stopped
    env_file:
      # The Slack credentials -- ONLY this container holds them (tools never do).
      - path: security/approval/service/.env
        required: false
    environment:
      APPROVAL_HOST: 0.0.0.0
      APPROVAL_PORT: 8072
      # Slack posts leave through the egress wall like everything else.
      HTTPS_PROXY: http://egress:3132
      HTTP_PROXY: http://egress:3132
      NO_PROXY: localhost,127.0.0.1
    networks:
      - internal
    depends_on:
      egress:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request;urllib.request.urlopen('http://127.0.0.1:8072/healthz',timeout=3)"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  # This tool screens its output through the guardrail (untrusted external content).
  xmcp:
    build:
      context: .   # repo root, so the image can COPY the shared ./security package
      dockerfile: tools/xmcp/Dockerfile
    image: mcp-xmcp
    profiles: ["xmcp"]
    restart: unless-stopped
    env_file:
      # The tool's secrets. required: false so a tool you haven't enabled (or filled
      # in) never blocks `up`; an ACTIVE tool missing its secrets fails loudly itself.
      - path: tools/xmcp/.env
        required: false
    # No published host port: the tool is on the internal network (the egress wall), which
    # can't publish one. Ingress is the tunnel's job; to reach it locally use
    # `docker compose exec` or a container on mcp-tools_internal.
    environment:
      MCP_HOST: 0.0.0.0
      MCP_PORT: 8061
      MCP_TRANSPORT: http
      # Security posture for local dev (the tunnel overlay flips these on). These override
      # the .env's production values (env beats env_file).
      MCP_AUTH_ENABLED: "0"
      MCP_REQUIRE_APPROVAL: "0"
      MCP_UNTRUSTED_OUTPUT: "1"
      GUARDRAIL_URL: http://guardrail:8071
      GUARDRAIL_ENABLED: "1"
      APPROVAL_URL: http://approval:8072
      # All outbound HTTPS is forced through the egress proxy; NO_PROXY keeps sideways +
      # loopback traffic direct (the sidecars, localhost, the Docker resolver).
      HTTPS_PROXY: http://egress:3128
      HTTP_PROXY: http://egress:3128
      NO_PROXY: guardrail,approval,localhost,127.0.0.1
    volumes:
      - xmcp-state:/app/state   # writable state (OAuth registrations + tokens when auth is on)
    networks:
      - internal
    depends_on:
      guardrail:
        condition: service_healthy   # wait for the screener before starting
      approval:
        condition: service_started
      egress:
        condition: service_started

  # Trusted tools: same shape, no guardrail leg. Each points at its OWN egress listener,
  # so it can only reach its own allowlist. Posture is local dev here; the overlay flips it.
  data:
    build:
      context: .
      dockerfile: tools/data/Dockerfile
    image: mcp-data
    profiles: ["data"]
    restart: unless-stopped
    env_file:
      - path: tools/data/.env
        required: false
    environment:
      MCP_HOST: 0.0.0.0
      MCP_TRANSPORT: http
      MCP_AUTH_ENABLED: "0"
      HTTPS_PROXY: http://egress:3129
      HTTP_PROXY: http://egress:3129
      NO_PROXY: localhost,127.0.0.1
      # Where lean-export writes Lean-format files (the volume shared with lean).
      LEAN_DATA_ROOT: /lean-data
    volumes:
      - data-state:/app/state
      - lean-data:/lean-data
    networks:
      - internal
    depends_on:
      egress:
        condition: service_started

  lean:
    build:
      context: .
      dockerfile: tools/lean/Dockerfile
    image: mcp-lean
    profiles: ["lean"]
    restart: unless-stopped
    env_file:
      - path: tools/lean/.env
        required: false
    environment:
      MCP_HOST: 0.0.0.0
      MCP_TRANSPORT: http
      MCP_AUTH_ENABLED: "0"
      HTTPS_PROXY: http://egress:3130
      HTTP_PROXY: http://egress:3130
      NO_PROXY: localhost,127.0.0.1
      # The engine backtests ONLY pipeline data (the volume the data tool exports
      # into) -- never the image's bundled samples. server.py seeds the two engine
      # metadata files (market hours, symbol properties) there at startup.
      LEAN_DATA_FOLDER: /lean-data
    volumes:
      - lean-state:/app/state
      - lean-data:/lean-data
    networks:
      - internal
    depends_on:
      egress:
        condition: service_started

  # Untrusted-output tool like xmcp: Telegram message content is a prompt-injection
  # vector, so results screen through the guardrail. Its stdio child (the vendored
  # engine) inherits this environment -- including the TELEGRAM_PROXY_* vars that
  # point MTProto at the egress wall (Telethon speaks raw TCP to DC IPs; the
  # HTTPS_PROXY env alone can't route it).
  telegram:
    build:
      context: .
      dockerfile: tools/telegram/Dockerfile
    image: mcp-telegram
    profiles: ["telegram"]   # opt-in: runs only when listed in COMPOSE_PROFILES (root .env)
    restart: unless-stopped
    env_file:
      - path: tools/telegram/.env
        required: false
    environment:
      MCP_HOST: 0.0.0.0
      MCP_TRANSPORT: http
      MCP_AUTH_ENABLED: "0"
      MCP_REQUIRE_APPROVAL: "0"
      MCP_UNTRUSTED_OUTPUT: "1"
      GUARDRAIL_URL: http://guardrail:8071
      GUARDRAIL_ENABLED: "1"
      APPROVAL_URL: http://approval:8072
      TELEGRAM_PROXY_TYPE: http
      TELEGRAM_PROXY_HOST: egress
      TELEGRAM_PROXY_PORT: "3131"
      HTTPS_PROXY: http://egress:3131
      HTTP_PROXY: http://egress:3131
      NO_PROXY: guardrail,approval,localhost,127.0.0.1
    volumes:
      - telegram-state:/app/state
    networks:
      - internal
    depends_on:
      guardrail:
        condition: service_healthy   # wait for the screener before starting
      approval:
        condition: service_started
      egress:
        condition: service_started

networks:
  # No gateway to the host/internet: containers here reach only each other + any peer
  # that also has an `edge` leg (the egress proxy). This is the wall.
  internal:
    internal: true
  edge: {}

volumes:
  telegram-state:
  lean-state:
  guardrail-hf-cache:
  xmcp-state:
  data-state:
  # Artifact plane between data (writer: lean-export) and lean (reader: the engine).
  # Cross-image access works via the shared 'leandata' group (gid 1500) both
  # Dockerfiles create -- the two images' 'app' users have different uids.
  lean-data:
