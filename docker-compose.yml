# =================================================================================
# The local stack: each tool as a slim container behind an egress wall, plus the
# guardrail as its own sidecar. Secrets come from each tool's .env; the same images
# run unchanged in the cloud.
#
#   cp env.example .env       # pick your tools: COMPOSE_PROFILES=xmcp,data,...
#   docker compose up --build
#
# Every TOOL carries a compose profile named after itself; only the tools listed in
# COMPOSE_PROFILES (root .env, or --profile flags) are built and started, so nobody
# pulls a tool's image — lean's is 13GB — without opting in. Profiles are the ONLY
# deploy-time choice. Everything else is substrate and needs no decision: the egress
# wall, the approval sidecar, and the gatekeeper always run ("using" the gatekeeper
# is just attaching its connector), and the guardrail lists the untrusted tools'
# profile names so it starts automatically exactly when a tool that needs it is
# deployed. The one guardrail knob is the provider (GUARDRAIL_PROVIDER: llamafirewall
# local-model default; deploy/aws uses bedrock).
#
# Security posture is chosen by env, not code (serve() reads it at startup): this base
# file runs auth off (local dev) but the guardrail on. The docker-compose.tunnel.yml
# overlay is the public deploy (auth on + the Cloudflare ingress).
#
# No depends_on anywhere, deliberately: start order needs no constraining because
# every dependency self-heals -- screening fails closed until the guardrail is
# healthy, sidecar registration lands on the next ~30s probe, and
# restart: unless-stopped retries anything that lost a race. A cold start may be
# scruffy for a minute; it cannot be wrong.
# =================================================================================
services:
  # Egress wall: each tool sits on the `internal` network (no gateway to the internet);
  # this proxy is the only peer with an `edge` leg, so it is the sole route off-box,
  # enforcing a per-tool CONNECT-only domain allowlist. A dep that ignores the proxy env
  # has nowhere to dial.
  egress:
    build: ./security/egress-proxy   # pinned ubuntu/squid + Ubuntu security updates
    image: mcp-egress
    restart: unless-stopped
    volumes:
      - ./security/egress-proxy/squid.compose.conf:/etc/squid/squid.conf:ro
      - ./security/egress-proxy/allowlist:/etc/squid/allowlist:ro
      # Extension hook: squid.compose.conf includes this (empty in this repo). An
      # overlay repo may mount its own conf over the same target to add listeners
      # -- see security/egress-proxy/local.conf.
      - ./security/egress-proxy/local.conf:/etc/squid/conf.d/local.conf:ro
    networks:
      - internal   # reachable by tools as http://egress:<port>
      - edge       # the only leg with internet -> performs the allowlisted CONNECTs

  # Output screen for the untrusted-output tools. NOT a deploy choice: its `profiles`
  # line below is the authoritative list of them, so compose starts it automatically
  # whenever one is deployed (a trusted-tools-only stack skips it); a new untrusted
  # tool adds its profile name there. The provider behind /scan is env-chosen: llamafirewall (local
  # model, default) or bedrock (AWS ApplyGuardrail; what deploy/aws sets). Running an
  # untrusted tool UNSCREENED (not recommended) is an explicit env choice --
  # MCP_UNTRUSTED_OUTPUT=0 on that tool; the tools fail closed on a half-off state.
  guardrail:
    build:
      context: ./security/guardrail/service
      args:
        # Same env var as the runtime switch below: the bedrock flavor's image
        # skips the local-model stack (torch/CUDA, multi-GB) entirely.
        GUARDRAIL_PROVIDER: ${GUARDRAIL_PROVIDER:-llamafirewall}
    image: mcp-guardrail
    profiles: ["telegram", "workspace", "browser"]   # auto: starts with any untrusted-output tool
    restart: unless-stopped
    # No published port -- a true sidecar, reached over the network as http://guardrail:8071.
    environment:
      GUARDRAIL_HOST: 0.0.0.0
      GUARDRAIL_PORT: 8071
      GUARDRAIL_PROVIDER: ${GUARDRAIL_PROVIDER:-llamafirewall}
      # llamafirewall: HF token for the gated PromptGuard model — first start pulls
      # it through the egress wall into the cache volume; empty token = degraded
      # (HiddenASCII-only), stated on /healthz.
      HF_TOKEN: ${HF_TOKEN:-}
      # bedrock: the Guardrail to call + where; credentials come from the instance
      # role (cloud) or mounted AWS env. The deploy/aws stack fills these in.
      BEDROCK_GUARDRAIL_ID: ${BEDROCK_GUARDRAIL_ID:-}
      BEDROCK_GUARDRAIL_VERSION: ${BEDROCK_GUARDRAIL_VERSION:-DRAFT}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      # Both providers' outbound traffic (HF pull / Bedrock API) leaves through the
      # egress wall on the guardrail's own allowlisted listener. That includes the
      # EC2 instance-metadata credential endpoint on cloud deploys: the sealed
      # internal network has no route to link-local, so squid carries IMDS on a
      # pinned allow (see squid.compose.conf).
      HTTPS_PROXY: http://egress:3133
      HTTP_PROXY: http://egress:3133
      NO_PROXY: localhost,127.0.0.1
    volumes:
      - guardrail-hf-cache:/app/.cache/huggingface   # persist the model cache across restarts
    networks:
      - internal   # egress only via the wall (listener 3133, allowlist/guardrail.txt)
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request;urllib.request.urlopen('http://127.0.0.1:8071/healthz',timeout=3)"]
      interval: 30s
      timeout: 5s
      start_period: 90s
      retries: 3

  # Approval sidecar: single owner of pending approvals + the Slack secrets for the
  # whole stack (Slack delivers all button clicks to ONE app-level URL, so approvals
  # need one owner or only one tool's buttons work). Tools create/check approvals at
  # http://approval:8072; the tunnel overlay exposes its human-facing pages publicly.
  approval:
    build: ./security/approval/service
    image: mcp-approval
    restart: unless-stopped
    env_file:
      # The Slack credentials -- ONLY this container holds them (tools never do).
      - path: security/approval/service/.env
        required: false
    environment:
      APPROVAL_HOST: 0.0.0.0
      APPROVAL_PORT: 8072
      # The sidecar is the sole authority on tool modes; the operator's choices
      # must survive a restart. /app/state is the image's app-owned writable dir.
      APPROVAL_STATE_FILE: /app/state/state.json
      # Slack posts leave through the egress wall like everything else.
      HTTPS_PROXY: http://egress:3132
      HTTP_PROXY: http://egress:3132
      NO_PROXY: localhost,127.0.0.1
    volumes:
      - approval-state:/app/state
    networks:
      - internal
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request;urllib.request.urlopen('http://127.0.0.1:8072/healthz',timeout=3)"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  # Untrusted-output tool: Telegram message content is a prompt-injection
  # vector, so results screen through the guardrail. Its stdio child (the vendored
  # engine) inherits this environment -- including the TELEGRAM_PROXY_* vars that
  # point MTProto at the egress wall (Telethon speaks raw TCP to DC IPs; the
  # HTTPS_PROXY env alone can't route it).
  telegram:
    build:
      context: .
      dockerfile: tools/telegram/Dockerfile
    image: mcp-telegram
    profiles: ["telegram"]   # opt-in: runs only when listed in COMPOSE_PROFILES (root .env)
    restart: unless-stopped
    env_file:
      - path: tools/telegram/.env
        required: false
    environment:
      MCP_HOST: 0.0.0.0
      MCP_TRANSPORT: http
      MCP_AUTH_ENABLED: "0"
      MCP_REQUIRE_APPROVAL: "0"
      MCP_UNTRUSTED_OUTPUT: "1"
      GUARDRAIL_URL: http://guardrail:8071
      GUARDRAIL_ENABLED: ${GUARDRAIL_ENABLED:-1}
      APPROVAL_URL: http://approval:8072
      TELEGRAM_PROXY_TYPE: http
      TELEGRAM_PROXY_HOST: egress
      TELEGRAM_PROXY_PORT: "3131"
      HTTPS_PROXY: http://egress:3131
      HTTP_PROXY: http://egress:3131
      NO_PROXY: guardrail,approval,localhost,127.0.0.1
    volumes:
      - telegram-state:/app/state
    networks:
      - internal

  # No profile: the gatekeeper is control-plane substrate (like the approval sidecar)
  # and always runs. "Using" it is simply attaching its connector in claude.ai.
  gatekeeper:
    build:
      context: .
      dockerfile: tools/gatekeeper/Dockerfile
    image: mcp-gatekeeper
    restart: unless-stopped
    env_file:
      - path: tools/gatekeeper/.env
        required: false
    environment:
      MCP_HOST: 0.0.0.0
      MCP_TRANSPORT: http
      MCP_AUTH_ENABLED: "0"
      MCP_REQUIRE_APPROVAL: "0"
      APPROVAL_URL: http://approval:8072
      HTTPS_PROXY: http://egress:3134
      HTTP_PROXY: http://egress:3134
      NO_PROXY: approval,localhost,127.0.0.1
    volumes:
      - gatekeeper-state:/app/state
    networks:
      - internal

  # This tool screens its output through the guardrail (untrusted external content:
  # mail bodies, docs, comments) and acts as YOUR Google account.
  workspace:
    build:
      context: .
      dockerfile: tools/workspace/Dockerfile
    image: mcp-workspace
    profiles: ["workspace"]   # opt-in: runs only when listed in COMPOSE_PROFILES (root .env)
    restart: unless-stopped
    env_file:
      - path: tools/workspace/.env
        required: false
    environment:
      MCP_HOST: 0.0.0.0
      MCP_TRANSPORT: http
      MCP_AUTH_ENABLED: "0"
      MCP_REQUIRE_APPROVAL: "0"
      MCP_UNTRUSTED_OUTPUT: "1"
      GUARDRAIL_URL: http://guardrail:8071
      GUARDRAIL_ENABLED: ${GUARDRAIL_ENABLED:-1}
      APPROVAL_URL: http://approval:8072
      HTTPS_PROXY: http://egress:3135
      HTTP_PROXY: http://egress:3135
      NO_PROXY: guardrail,approval,localhost,127.0.0.1
    volumes:
      - workspace-state:/app/state
    networks:
      - internal

  # Untrusted-output tool: web pages are a prompt-injection vector, so
  # results screen through the guardrail. The stdio child (@playwright/mcp) drives
  # a HEADED Chromium on the container's Xvfb display; the entrypoint's noVNC live
  # view (port 6080, routed by the tunnel overlay) watches that same display.
  browser:
    build:
      context: .
      dockerfile: tools/browser/Dockerfile
    image: mcp-browser
    profiles: ["browser"]   # opt-in: runs only when listed in COMPOSE_PROFILES (root .env)
    restart: unless-stopped
    # Chromium maps renderer shared memory into /dev/shm; docker's 64MB default
    # crashes tabs on real pages.
    shm_size: 2gb
    env_file:
      - path: tools/browser/.env
        required: false
    environment:
      MCP_HOST: 0.0.0.0
      MCP_TRANSPORT: http
      MCP_AUTH_ENABLED: "0"
      MCP_REQUIRE_APPROVAL: "0"
      MCP_UNTRUSTED_OUTPUT: "1"
      GUARDRAIL_URL: http://guardrail:8071
      GUARDRAIL_ENABLED: ${GUARDRAIL_ENABLED:-1}
      # The approval sidecar: modes + the startup catalog registration that puts
      # this tool in the manage panel (see serve()'s /healthz).
      APPROVAL_URL: http://approval:8072
      # server.py passes this to Chromium as --proxy-server (browsers ignore the
      # proxy env vars); the browser listener is the wall's one
      # allow-all-external rule -- see squid.compose.conf.
      HTTPS_PROXY: http://egress:3136
      HTTP_PROXY: http://egress:3136
      # sidecars must bypass the egress wall (sideways traffic, not internet).
      NO_PROXY: guardrail,approval,localhost,127.0.0.1
    volumes:
      - browser-state:/app/state
      # Artifacts (downloads, PDFs, recordings — server.py's --output-dir) get their
      # own volume, nested over browser-state, so the sync sidecar below can drain
      # them WITHOUT ever seeing the Chromium profile or the OAuth store.
      - browser-artifacts:/app/state/output
    networks:
      - internal

  # Drains the browser's artifacts to the operator's Google Drive (folder
  # "browser-artifacts") and deletes local copies after confirmed upload — files
  # land where the operator actually views them, and the volume stays empty (the
  # hygiene story). Not a tool: no MCP surface, no approval/guardrail wiring.
  # --min-age skips files still being written (a recording uploads ~a minute after
  # it ends, never mid-write); .crdownload partials are excluded outright.
  # Engine session debris (page-*.yml snapshots, console-*.log) is NOT worth a
  # Drive round-trip: excluded from the move, deleted locally after an hour
  # instead — old enough that no in-flight tool call still references it.
  # One-time setup mints a drive.file-scoped token into browser-sync-state
  # (see tools/browser/env.example) — that scope only reaches files this remote
  # created, so a compromised sync job can't read the rest of Drive. Until the
  # token exists the loop just idles.
  browser-sync:
    image: rclone/rclone:1.72.0@sha256:0eb18825ac9732c21c11d654007170572bbd495352bb6dbb624f18e4f462c496
    profiles: ["browser"]   # runs exactly when the browser does
    restart: unless-stopped
    environment:
      RCLONE_CONFIG: /config/rclone/rclone.conf
      # rclone is Go: unlike Chromium it honors the proxy env vars, so the wall
      # needs no launch flags. Its listener allows only the Drive endpoints.
      HTTPS_PROXY: http://egress:3137
      HTTP_PROXY: http://egress:3137
      NO_PROXY: localhost,127.0.0.1
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        while true; do
          if [ -f "$$RCLONE_CONFIG" ]; then
            rclone move /artifacts gdrive:browser-artifacts \
              --min-age 30s --exclude '*.crdownload' \
              --exclude 'page-*.yml' --exclude 'console-*.log' \
              --delete-empty-src-dirs
          else
            echo "browser-sync: idling -- no Drive token yet. Mint it once (details in tools/browser/env.example):"
            echo "  docker run --rm -it --network host -v mcp-tools_browser-sync-state:/config/rclone rclone/rclone:1.72.0 config"
          fi
          rclone delete /artifacts --min-age 1h \
            --include 'page-*.yml' --include 'console-*.log'
          sleep 30
        done
    volumes:
      - browser-artifacts:/artifacts
      # rclone rewrites the refreshed OAuth token into its config, so the config
      # mount must be writable and persistent.
      - browser-sync-state:/config/rclone
    networks:
      - internal

networks:
  # No gateway to the host/internet: containers here reach only each other + any peer
  # that also has an `edge` leg (the egress proxy). This is the wall.
  internal:
    internal: true
  edge: {}

volumes:
  browser-state:
  browser-artifacts:
  browser-sync-state:
  workspace-state:
  approval-state:
  gatekeeper-state:
  telegram-state:
  guardrail-hf-cache:
